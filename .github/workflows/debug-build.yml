name: Debug APK Build

on:
  workflow_dispatch:

env:
  NDK_VERSION: '28.0.13004108'

jobs:
  build-debug:
    runs-on: ubuntu-latest-8-cores

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Install NDK
      run: echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

    - name: Build debug APK
      run: ./gradlew assemblePlayProdDebug -x lint -x test

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: signal-debug-apk
        path: app/build/outputs/apk/playProd/debug/*.apk
        retention-days: 14
